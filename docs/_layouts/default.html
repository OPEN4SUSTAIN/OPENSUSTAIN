<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>hljs.highlightAll();</script>
</head>
<body>
  <nav class="nav">
    <a class="nav-brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <ul class="nav-links">
      <li><a href="{{ '/' | relative_url }}">Home</a></li>
      <li><a href="{{ '/documentation' | relative_url }}">Docs</a></li>
      <li><a href="{{ '/github-app-setup' | relative_url }}">App Setup</a></li>
      <li><a href="{{ '/rate-limiting' | relative_url }}">Rate Limits</a></li>
      <li><a href="{{ site.github.repository_url }}">GitHub</a></li>
    </ul>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }} &middot; <a href="{{ site.github.repository_url }}">View on GitHub</a></p>
  </footer>
</body>
</html>
